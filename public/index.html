<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slurm Job History Explorer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Slurm Job History Explorer</p>
          <h1>Job runtime scatter</h1>
        </div>
        <form id="filters" class="filters">
          <label>
            Window
            <select id="days" name="days">
              <option value="1">1 day</option>
              <option value="7">7 days</option>
              <option value="14" selected>14 days</option>
              <option value="30">30 days</option>
              <option value="90">90 days</option>
            </select>
          </label>
          <label>
            Limit
            <input id="limit" name="limit" type="number" min="10" max="5000" step="10" value="500">
          </label>
          <button type="submit">Refresh</button>
        </form>
      </header>

      <section class="summary" aria-label="Runtime summary">
        <article>
          <span id="jobCount">0</span>
          <p>jobs</p>
        </article>
        <article>
          <span id="medianRuntime">-</span>
          <p>median runtime</p>
        </article>
        <article>
          <span id="p95Runtime">-</span>
          <p>p95 runtime</p>
        </article>
        <article>
          <span id="source">-</span>
          <p>data source</p>
        </article>
      </section>

      <section class="chart-panel">
        <div class="chart-head">
          <div>
            <h2>Runtime by start time</h2>
            <p id="status">Loading job history...</p>
          </div>
          <div class="chart-tools">
            <button id="resetZoom" class="secondary" type="button" disabled>Reset zoom</button>
            <div class="legend-stack">
              <div id="stateLegend" class="legend" aria-label="State color legend"></div>
              <div class="size-legend" aria-label="Runtime size legend">
                <span>Runtime</span>
                <i class="size-1"></i>
                <i class="size-2"></i>
                <i class="size-3"></i>
                <i class="size-4"></i>
                <i class="size-5"></i>
              </div>
            </div>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="runtimeChart" width="1280" height="620" aria-label="Scatter plot of Slurm job runtimes"></canvas>
          <div id="tooltip" class="tooltip" hidden></div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
