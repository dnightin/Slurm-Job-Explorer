<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slurm Job History Explorer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="title-block">
          <p class="eyebrow">Slurm Job History Explorer</p>
          <h1>Runtime explorer</h1>
          <p id="datasetMeta" class="dataset-meta">Loading job history...</p>
        </div>
        <section class="control-panel" aria-label="Job filters">
          <form id="filters" class="filters">
            <label>
              Window
              <select id="days" name="days">
                <option value="1">1 day</option>
                <option value="7">7 days</option>
                <option value="14" selected>14 days</option>
                <option value="30">30 days</option>
                <option value="90">90 days</option>
              </select>
            </label>
            <label>
              Limit
              <input id="limit" name="limit" type="number" min="10" max="5000" step="10" value="500">
            </label>
            <label>
              User
              <select id="userFilter" name="user">
                <option value="">All users</option>
              </select>
            </label>
            <button type="submit">Refresh</button>
          </form>
        </section>
      </header>

      <section class="summary" aria-label="Runtime summary">
        <article>
          <span id="jobCount">0</span>
          <p>visible jobs</p>
        </article>
        <article>
          <span id="medianRuntime">-</span>
          <p>median runtime</p>
        </article>
        <article>
          <span id="longestRuntime">-</span>
          <p>longest runtime</p>
        </article>
        <article>
          <span id="successRate">-</span>
          <p>completed</p>
        </article>
        <article>
          <span id="problemJobs">-</span>
          <p>non-completed</p>
        </article>
      </section>

      <section class="chart-panel">
        <div class="chart-head">
          <div>
            <h2>Runtime by start time</h2>
            <p id="status">Loading job history...</p>
          </div>
          <div class="chart-tools">
            <button id="resetZoom" class="secondary" type="button" disabled>Reset zoom</button>
            <div class="legend-stack">
              <div id="stateLegend" class="legend" aria-label="State color legend"></div>
              <div class="size-legend" aria-label="Runtime size legend">
                <span>Runtime</span>
                <i class="size-1" title="0-12 hours"></i>
                <i class="size-2" title="13-72 hours"></i>
                <i class="size-3" title="73 hours-1 week"></i>
                <i class="size-4" title="2 weeks"></i>
                <i class="size-5" title="28+ days"></i>
              </div>
            </div>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="runtimeChart" width="1280" height="620" aria-label="Scatter plot of Slurm job runtimes"></canvas>
          <div id="tooltip" class="tooltip" hidden></div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
